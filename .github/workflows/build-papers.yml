name: Build Papers

on:
  push:
    branches: [main]
    paths:
      - 'papers/**'
      - '.github/workflows/build-papers.yml'
  pull_request:
    branches: [main]
    paths:
      - 'papers/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ProbTT
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: papers/probtt
          root_file: probtt.tex

      - name: Collect PDFs
        run: |
          mkdir -p dist
          cp papers/probtt/probtt.pdf dist/probtt.pdf

      - name: Upload PDFs
        uses: actions/upload-artifact@v4
        with:
          name: papers
          path: dist/*.pdf
          retention-days: 90
