name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lean:
    name: Lean (formalization)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean build
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lake-manifest.json', 'lean/lakefile.toml') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Fetch Mathlib build cache
        working-directory: lean
        run: lake exe cache get || true

      - name: Build Lean project
        working-directory: lean
        run: lake build

      - name: Enforce zero sorry/admit
        working-directory: lean
        run: |
          if grep -rnE '\bsorry\b|\badmit\b' Cred --include='*.lean' \
            | grep -viE 'admit no conditional|admit no|admits every|no sorry'; then
            echo "::error::found a sorry/admit tactic in Cred"
            exit 1
          fi
          echo "no sorry/admit"

  papers:
    name: Papers
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        part: [singlepaper, part1, part2, part3, part4, part5, part6, part7]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build paper ${{ matrix.part }}
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: ${{ matrix.part }}
          root_file: paper.tex
          latexmk_use_lualatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: cred-${{ matrix.part }}-pdf
          path: ${{ matrix.part }}/paper.pdf
          retention-days: 30
