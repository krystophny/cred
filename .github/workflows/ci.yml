name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lean:
    name: Lean (formalization)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup elan (Lean toolchain manager)
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Cache Lean build
        uses: actions/cache@v4
        with:
          path: lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lake-manifest.json', 'lean/lakefile.toml') }}
          restore-keys: |
            lean-${{ runner.os }}-

      - name: Build Lean project
        run: lake build
        working-directory: lean

  latex:
    name: LaTeX (part1 paper)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Cred paper
        uses: xu-cheng/latex-action@v3
        with:
          working_directory: part1
          root_file: paper.tex
          latexmk_use_lualatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: cred-paper
          path: part1/paper.pdf
          retention-days: 30
